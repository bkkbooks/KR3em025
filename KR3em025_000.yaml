body:
  text: 咽喉總論咽喉氣之呼吸食之出入乃人身之門戶也其證雖繁多歸於火蓋少陰君火少陽相火二脈並絡於咽喉君火勢緩則熱結而為疼為腫相火勢急則熱結而為癰為痹痹甚不通而痰塞以死矣經曰一陰一陽結謂之痹所謂一陰者肝與心胞也所謂一陽者膽與三焦也四經皆有相火火者痰之本痰者火之標故言火則痰在其中矣言喉則牙舌亦在其中矣火有虛實實火因過食煎炒蘊積熱毒煩渴二便閉塞風痰上壅將發喉痹必先三日胸膈不利脈弦數當去風痰解熱毒至於虛火因飲酒則動脾火忿怒則動肝火色欲則動腎火火炎上攻咽喉乾燥二便如常少陰脈數宜養陰降火此治咽喉病之大綱也今特進言其目條目凡一二日腫痛三四日勢定第三日必發寒熱或頭痛不止用本醫士秋字藥病即已凡喉證之變皆疏忽於第三日故也喉痹屬熱屬痰屬風風多者吹本醫士碧玉散痰多者吹秋字藥不速治則痹鬱而兼熱毒致髮乳蛾等證治法去風痰解熱毒開鬱單乳蛾多因酒色鬱結而發生於喉旁或左或右一日痛二日紅腫三日有形如細白星發寒熱者凶四日勢定大約四五日可愈用青藥五分黃藥一分後青三黃二同吹痰出盡後再服煎劑微利之大便去後當愈如至三日看喉內但紅腫無細白星即為癰證若三日後紅退但腫兩旁左右即為雙乳蛾然左屬心右屬肝煎劑內左宜加黃連五分制皂角七分右宜加赤芍八分柴胡六分雙蛾兼用如大便不通加枳殼一錢玄明粉七分連珠蛾者二白星上下相連又云狀如纏袋用藥照前雙乳蛾較單乳蛾重連珠則尤重也喉癰證因過食辛辣炙煿厚味醇酒感熱而發屬肺經痛喉證中無形跡但喉腫而痛重者亦發寒熱頭痛四五日可愈用青藥加黃藥少許內服煎劑及膏子藥喉菌證屬憂鬱血熱氣滯而發婦人多患此狀如浮萍略高而厚紫色生在喉旁初起用青藥五分黃藥一分後用青三黃二和吹內服煎藥不可間斷亦難速愈輕則半月餘重則經年治之得法則愈要守忌戒口頸癰證胸前紅腫形在外亦要內攻甚則喉腫閉結要出膿外用三黃散敷內用青藥吹並服煎劑面癰與頸癰相仿大抵屬郁托腮癰結熱而發治法與頸癰同外敷三黃散方生大黃一錢生蒲黃五分薑片五分冰片五分麝香二釐為末蜜調加蔥汁二三匙敷患處或芭蕉汁或扁柏汁亦可䵟舌證舌下生如小舌者若連喉腫痛即為喉癰不連喉痛非癰也肺熱性燥感成熱毒所致煎劑用犀角地黃湯加減吹用黃藥須至舌根兩旁勤吹方速效喉內用青十黃一頻吹喉閉傷寒後見者難治為其閉氣不通無形無聲故也纏喉風證因心中燥結而發先兩日必胸膈氣緊出氣短促忽然咽喉腫痛手足厥冷頸如紋轉結於內腫繞於外且麻且痹喉中紅絲繞緊手指甲白色手心壯熱喉腫而大風痰壅盛如拽鋸之聲是其候也最為急證速吹服藥可愈若遲過一日夜目直視喉中如雷鳴者不治再用燈火近患人口即滅者不治如喘急頭汗危在旦夕矣倘下藥須加牛黃一錢以上二證十無一生不可輕醫一凡傷寒後患連珠蛾及喉閉證多不治以其喉項強硬目睛上視皆死候也一凡患喉證一二日不發寒熱尚輕若三日發寒熱證必加重亦必問其大小便通塞如通證必即減不過浮游之火攻於咽喉耳宜內服清熱解毒消風之藥若二便不通證必加重內有毒火非用降火消毒之劑及通利二便之藥火從何泄病從何解乎故證有輕重治有緩急並要問頭痛不痛證雖甚凶若發於外而不見死證者無妨一凡喉證須吹藥四五管可以出痰痰亦必去三次方可愈至出痰一管藥內必用黃藥為要吹時必須直對喉中重重吹入乃效吹過急提出管恐痰涎湧出耳一凡喉證先碎須用涼藥吹之後用青藥若欲出痰單用黃藥方能提去頑痰初起一二日用青藥漸漸多加黃藥熱甚黃藥為君一凡喉證大便去後方去病痊若猶閉結不可輕許其愈若無痰者不治一凡患喉證面發紅腫白亮無神脈沉微無力是神氣外泄無陽故也證凶必死若面發紅腫脈大有力證雖重不死是有元氣而火氣盛耳一凡喉刺痛因患勞瘁既久虛火上升榮竭血盡患此者其喉上顎有紅腫密密如蚊蟲狀危篤將死之候也一凡喉連胸紅腫此係肺癰證必用蜜調膏子藥及百藥煎凡患肺癰疑似之間取生綠豆嚼之不覺豆腥者是一凡喉中無形止紅腫者宜多用燈草灰乳蛾亦然一凡喉證初起大便閉結宜用生大黃玄明粉各一錢二分微利之則火自降而易愈若至五六日久不食而大便閉結者誤用立斃蓋因病久胃氣已虛元氣亦弱雖閉甚宜蜜煎導而通之一凡喉證初起內服解毒之劑而兼發散之藥則毒易愈解毒必加牛蒡子連翹之類發散加紫蘇葛根之類及荊防忌用桔梗一凡婦人喉證腫痛有因經閉致火上升者服通經藥三四劑經通而證自愈其證喉腫而色紅一凡喉證不可純用涼藥取效目前上熱未降下寒復起毒氣乘虛而入腹胸前高腫上喘下泄手足指甲青黑七日後全不進食如魚口而死一治咽喉者忌發汗或針砭出血即汗之義也其腎虛傷寒及蒂中喉內之喉花腫尤忌針如內傷虛損咽中生瘡語言失音者死不治一凡舌下起五峰如蓮名曰舌下蓮止可針兩邊四峰不可針中峰誤針者死一凡舌腫脹滿口吐舌在外者用制過殭蠶制過皂角二味為細末和勻用少許吹入鼻中男左女右吹之牙關自開痰涎自吐然後用箸卷絲綿蘸甘草湯潤舌唇後用黃藥多加冰片頻吹一凡腮以內腫爛用箸扎絲綿蘸水輕攪患處病者即愈若不知痛此係死肉多難愈一凡舌腫大用生蒲黃末加冰片敷之欲止血用炒蒲黃一凡䵟舌喉癰二證大便不通煎劑內加生大黃玄明粉各一錢二分此微利法亦抽熱下行法不可用承氣湯變成攻下流弊滋多小便不通者調六一散服之效一凡喉舌等證初起吹藥一次即令患者低頭開口漏出痰涎黏唾者易愈吹藥無涎者不治辨喉證喉證初起一寒戰而生者發後身涼口不碎又無重舌或二便俱利不要認作熱證皆由陽虛寒冷而發也其痰不可提盡此痰即身內之精神所化與牙關緊乳蛾䵟舌之痰毒種一氣必流盡毒而愈者不同若一流盡則精神竭而必死先以藥吹之或以水漱之法使一通便服藥初劑發散和解二劑即用溫補滋養設三四日後再發寒戰或心痛脅痛骨痛等證死不治發時牙關緊急喉舌俱脹口碎而臭或有重舌或舌上有黃屑屑者發後下午再發微寒熱大小便閉結者即作熱證用石膏敗毒散主之證亦易愈如漸起之證三四日後而發寒熱者雖凶不害惟有證未減而牙關反不緊急唇不腫而如好人者不治舌腫滿口者不治色如蒲桃茄子如砂紙者不治或連重舌發寒熱猶可治也重舌捺之色雪白捺舌一起即紫色或紅色此身內氣血已死然口臭者猶可望生最忌口渴氣急痰多而稠如桃膠者死期甚速一頸全紅腫者亦極危也面紅帶紫面青帶白神氣少者俱不治不語者死略能語者尚有生機面色少神氣而好坐低處者亦難治喉內之喉花為帝中性命所關舌下紫筋為舌系通於腎白腫不治傷之即死亦性命所關也舌癰證舌紅腫大屬心經火盛地角亦紅腫吹藥用青黃各半吹至舌根煎劑多用黃連山梔犀角木舌證生舌根下狀如白棗有青紫筋者不能速愈半月方痊如初起不作痛不發寒熱漸漸腫大起發愈遲則愈難痊皆因憂鬱而起內服煎藥外用青藥加黃藥初時或青黃兼用後單用黃藥者又有一種舌腫硬不能舉動者亦名木舌治法同舌下又生舌名曰重舌或腫面腫腮先在外見但有膿處即用利刀出血次針舌下兩邊青筋出血宜早治遲則爛下舌根而死矣舌菌證屬心經多因氣鬱而生生於舌上如菌狀或如木耳紅紫色紫舌脹證屬心火內必煩躁悶亂單用青藥吹內服犀角地黃湯可漸愈懸癰生於上顎紫色泡如豆大用銀針腳挑破出血涼藥吹之牙槽風證初起先齒痛不已後牙齦內浮腫紫黑色或出血久則腐爛而臭難速愈牙漏證即前證久不愈齒縫中出白膿是也極難調治如上左邊門牙落者不治此證屬胃火腎虛搜牙床此證初起牙床必腫痛當用披針出其血後用青鹽擦之若屢用披針日久骨自露者難治牙癰證一名牙蜞風牙齦腫病毒盛成瘡初起有小塊生於牙齦肉上或上或下或內或外其狀高硬若生泡針出膿血而愈硬厚成疹狀者施麻藥京墨如法割之烙鐵燙過自愈牙咬證生牙盡處骱中齒不能開熱勢凶至夜尤甚然易愈不害命牙䵟證屬胃火如豆大或內或外無定處牙宣證乃縫中出血上屬脾下屬胃因陽明經實火上攻而出也必有胃火虛動腐爛牙齦以致淡血常常滲漏也牙菌證生牙齦其狀紫花色高起如菌狀此乃血熱而兼氣滯也穿牙疔證先二日牙痛發寒熱後痛不可忍牙齦上發一塊紫色是也穿牙毒即前證初起未破者疔已破者毒色紅者可治青者死崩砂疳口風證自舌下牙齦上腫赤口內作焮如渴熱牙齦漸爛亦能脫齒為患連珠疳口風證自舌下起小泡初起一個又一個甚者三五七八九連珠而生魚風證系危病如魚吸水故名死不治走馬牙疳證大人患者即黴瘡毒攻小兒患者或因胎毒或因痘後餘毒齒齦腐爛成疳殺人最速鼻梁發紅點如珠者不治其色如干醬一日爛一分二日爛一寸故名走馬言其速也有齒者落盡而死矣用黃藥吹宜服蘆薈消疳飲牙疳五不治口臭涎穢者不治黑腐脫爛者不治牙落無血者不治穿腮破唇者不治用藥不效者不治鵝口疳證一名雪口初生小兒滿口連舌上生白屑如鵝口樣故名馬牙證初生小兒先受胎毒熱氣出胎後受風風熱相搏即生但看牙齦上有白色脆骨者即是其初發也出胎時即打噴嚏已冒外風伏馬牙之根矣若延至吮乳時尚不知覺察病深且危故不急治者即死切勿誤認作黃疸之類出胎時即當看日日要挑至三四日病即成五六日堅硬難治矣甚有發而再發者大約百日外方免此患凡口疳黑腐而臭者不治小兒胎疳黃色如干橘瓤者不治凡小兒走馬牙疳及大人骨槽風須防落牙至上門牙偏左一牙是牙中之王此牙一落余牙必落最重難治此牙不落余牙尚可治凡治口疳須用棉花或絲棉卷在箸上輕攪患處然後吹藥凡唇上疳難吹藥者或蜜調或溫水潤再敷凡面上放光而色白者不治或放光而色紅者可治屢試屢驗所謂放光者面上繃急而放光也乳蛾生喉間形如乳頭凡針乳蛾宜針頭尾不可針中間鮮血易治黑血難治凡使刀針不可傷蒂疔及舌下根懸癰生上顎如紫李宜針破腮癰生腮下先用吐法再針紫黑處去瘀血喉癰命門合相火也如灌膿即以銀針挑破之牙癰腫痛亦灌膿也宜挑之喉瘤生於喉旁形如圓眼血絲相裹不可用刀針極熟者以筆針刺之岩按用筆針法見喉科枕秘喉八證辨手少陰少陽二脈並系喉氣熱則內結腫脹痹而不通則死其不通之證有八曰雙乳蛾曰單乳蛾曰雙閉喉曰單閉喉曰子舌脹曰木舌脹曰纏喉風曰走馬喉閉熱氣上行故傳於喉之兩旁向外作腫以其形似是謂乳蛾一為單二為雙較乳蛾差小者名閉喉熱結舌下復生一小舌名子舌脹熱結於舌中而舌為之腫名木舌脹木者木強而不仁之謂熱結於喉腫繞於外且麻且癢且腫且大者名纏喉風暴發暴死者名走馬喉閉此八者皆屬諸火微者咸以軟之甚者下以散之至於走馬喉閉生死在於反掌急砭刺出血病亦可愈咽喉屬於肺有虛火實火之分緊喉慢喉之證虛火者思慮過多中氣不足礙若蝦皮刺如茅草喘急多痰不可誤投涼劑實火者縱飲恣意積熱所致甚者風痰上壅咽門閉塞滴水不久聲音不出此為緊急喉風用藥不及惟針刺喉間發泄毒血次則拔髮咬指吐痰嗅鼻乃效若夫癰痹蛾者皆標病雖重無妨凡喉閉不刺血喉風不倒痰喉癰不放膿喉痹乳蛾不針烙皆非法也其有痰火勞嗽咳傷咽喉者坎水已竭離火為殃雖存濟世之心莫補回天之力紅羊大劫滿目瘡痍吾子孫有挾吾術以濟世者務必確守吾言附方青藥消痰清熱解毒卻風而藥性和緩不若黃藥之消腫毒開喉閉出痰涎最為神爽乃第一緊要藥也但喉症初起黃藥不可多用以其直透入內且善走散初起驟多恐證輕不勝與病反不相入耳凡制青藥大約春夏宜薄荷多制礬少故配成青色秋冬宜制礬多薄荷少故略帶白色如欲喉證出痰不妨加皂角末少許惟遇喉癰及單乳蛾輕證可單用取效若他證必兼用黃藥乃能神應然青黃兼用須知先後多少最為要訣青藥方治一切喉舌蛾癰等證每制礬三分先配百草霜五釐研細入燈草灰五釐再研配成瓦灰色後加粉草末二分薄荷二分再研細入冰片五釐此藥須用時配合多日則無效陰雨止可用一日如吹喉證欲其出痰加殭蠶皂角末各三四釐然青藥惟遇單乳蛾喉癰等輕證可單用若他證必兼用黃藥制礬法生明礬研極細末入傾銀罐內先放大半罐且止將罐入爐火內用桴炭火煅熔以銅箸攪無礬塊為度乃將槍硝研細末投入礬內約十分之五次將白硼砂研投入礬內亦十分之五少頃再投礬末逐漸投下候礬盡化照前投硝硼少許如此逐層漸漸投盡直待礬涼啟罐口如饅頭樣方架起炭火燒至礬枯用新瓦一片蓋罐上一點盅取起將牛黃少許研末用水五六匙調和勻灑礬上將罐仍入火內烘乾取起連罐覆淨地上先用紙襯地方合罐罐上覆以碗過七日夜取起收貯聽用須輕鬆無豎紋者佳煅時火候宜初起緩亦不可太緩恐礬僵則不熔化矣化後用文武火如礬未化盡即下硝硼必不能熔而堅實有豎紋矣其罐擇未傾銀者用必先放火上烘熱亦不可放炭火上使溫氣入罐取百草霜法須取其近鍋底者若鍋底心及鍋口者俱不用先輕輕刮去上面一層輕取中一層用之著底者亦不用黃藥方善能消腫出痰治一切口舌等證制槍硝一錢八分生蒲黃研極細末四分制殭蠶末一分制皂角末一分五釐將前藥研勻如淡鵝黃色為度再加冰片一分再研勻冰片一味須細淨研入如遇牙咬䵟舌穿牙疔等毒證專用此藥治之如咽喉等證兼用青藥看病之輕重為藥之多寡重者加入牛黃喉證及纏喉風加殭蠶皂角二末餘證只用硝黃二味可也制硝法槍硝用長白如牙而厚者如硝一斤用水八碗入鍋內煎至六碗取起入尖底敞口砂盆將竹片三枝做品字放盆內過一宿則硝自凝即於底提起竹枝則硝自起矣須十二月合可以久用過十二月則味淡而性平又方用溫湯蘸過以綿紙挹干仍用紙包放灶上洞內五六日收去濕氣俟白如霜方可用倘急用不及制炒亦可制殭蠶法殭蠶細直腹小為雄粗彎腹大為雌宜用雄者須將牙刷刷去灰砂置瓦上慢火炙至醬色為度又要折斷中無相連為佳制皂角法取堅小不蛀者為佳瓦上炙至色光明而脆為度去兩頭為末聽用制百藥煎法五倍子一斤研末細兒茶一兩酵頭四兩先用水二碗煎茶取濃汁半碗拌勻五倍子末及發酵置盆內蓋口外用粗糠上下四圍蓋緊至六七日發起則如面矣收起做成餅曬乾為末此方失去下一半製法不全制青梅法用大青梅一斤打碎入明礬末半斤拌勻置陽城罐內火煅至礬枯為度取起置地上出火氣聽用開牙關法如喉證牙關緊閉而不開者先用銀針刺兩手大指少商穴大指里側離指甲韭菜葉許掏之痠痛者即是穴屬肺經出血再用烏梅擦牙上下然後用殭蠶皂角末吹鼻內打噴嚏即開口矣此不傳之秘法也隨即吹黃藥三次以青藥善其後蒲黃當用生研細羅篩篩過取極細黃末聽用若粗而褐色者不堪用喉證煎藥主方大力子君炒研一錢連翹君七分桔梗一錢生甘草三分銀花七分元參八分黑山梔七分黃芩七分花粉八分前胡一錢薄荷八分水煎服如發寒熱加荊防頭痛加煨石膏胸悶加炒枳殼如鬱熱而發加赤芍川貝母口渴加知母麥冬舌證煎藥主方川黃連君八分黑山梔一錢犀角七分生地八分丹皮八分赤芍八分麥冬八分生甘草三分燈草心二十根煎服如兼唇口加煅石膏八分以瀉脾火以環唇屬脾也惟舌屬心故專主瀉心火如有鬱熱兼有痰加川貝母七分不拘咽喉牙舌證凡大便不通者加炒枳殼玄明粉各八分牙證煎藥主方黑山梔君一錢玄參君一錢丹皮生地黃柏知母酒白芍地骨皮車前子各七分熱甚加煅石膏八分炒黑升麻七分風加荊芥穗八分虛加熟地一錢枸杞子七分如餘毒加連翹八分黃連七分若穿牙疔毒則用消腫解毒之劑如紫花地丁甘菊花之類總之齒乃腎之標骨之餘足陽明胃經之脈貫絡於齒上齦手陽明大腸經之脈貫絡於齒下齦其在外感者屬二經之風熱與二經之受風寒停留而化熱者居多其在內傷者屬腎熱亦有腎虛三十六證咽喉解毒湯玄參木通淡竹葉生地生山梔等分燈草心二十根水煎將好時加入生大黃四錢朴硝二錢水泡去渣滾二三沸溫服或將朴硝沖服更妙蓋咽喉是毒證此解毒法也如挾風痰熱毒攻心言語狂妄加三黃並研硃砂珍珠末服涼藥方專治喉癬喉菌等證薄荷一錢研制硝八分制礬八分百草霜一分燈草灰一分川貝母一分研生甘草一分研冰片三釐先將硝礬百草霜研勻後入燈草灰再研入薄荷貝母甘草末再研末後加入冰片研細用上白蜜調如青灰色時時噙咽若重證多用黃藥涼藥吹疳藥方煅人中白四錢生蒲黃三錢研燈草灰一錢硼砂三錢臨用拌入生甘草二錢青梅制礬五錢初用多加後用漸減薄荷五錢黃柏五錢此方失去上一半製法不全蘆薈消疳飲凡走馬牙疳其患多在痧痘後餘毒未清又兼雜證熱甚而成者如牙齦作爛且臭且黑且腐甚者牙齦脫落齦窠亦朽不數日間即穿腮破唇為不治矣宜用此湯外用人中白或冰硼散二藥搽之取去黑肉內見紅肉血流為吉如取時頑肉不脫腐肉漸開焮腫外發臭味不止更兼身熱不退俱不治凡小兒走馬牙疳身熱氣粗牙齦腐臭以及穿腮破唇者並須服之蘆薈銀柴胡黃連大力子玄參桔梗山梔石膏薄荷各五分羚羊角三分淡竹葉三分人中白散煅人中白二兩兒茶一兩黃柏薄荷青黛各六分冰片共研細末先用溫水漱口後吹藥每日六七次涎從外流者吉涎收入里者毒甚凶制百藥煎法與前法互異今並存之川五倍半斤打碎煎數滾入陳松蘿茶四兩加大力子不拘分兩同煎去渣再煎用粉兒茶二兩百草霜二兩研末收治一切牙口疳人中白煅六錢青黛二錢冬桑葉二錢漿梅條皮三錢帶漿隔鍋燒成炭燈草灰三錢冰片一錢以上共研末吹之鐵鞋散治走馬牙疳黑棗一枚去核入雄黃末填滿用鹽搓麻線扎外用濕紙包煨存性研末搽之玄明醋治喉中痰涎壅塞玄明粉好淡米醋和灌攪吐痰烏龍散治纏喉風牙皂七條水一杯煎三分入人乳三滴冷服非吐即瀉虛喉忌神品散喉風喉蛾兼治牙皂白礬黃連等分皂連入礬內同炙乾研末吹上有痰任流咽喉七十二證考一鎖喉風熱痰生自胃膈喉中如鎖管狀雙者難治先探吐風痰針刺出黃白水不治如咬牙吹通關散二纏喉風屬痰熱白為白纏黃為黃纏腫噤難言腮頷亦兼腫眼白耳赤面紫腫連項下如蛇蟠狀一二日者慢風急者旦夕死先刺少商探風痰鼻有青黑氣寒頭低痰如膠者不治三喉風壅塞痰涎腫痛面黑聲雷頸腫者不治四瘜肉喉風因受汙穢氣及風熱喉生赤肉層疊漸腫孔出臭氣者不過三日死五啞瘴喉風屬風痰牙緊吐涎口不能言蟾酥化水滴鼻中即開看喉赤腫處下刀吹藥面紫舌青黑鼻冷涕爪甲青目赤圓不治六弄舌喉風不言舌常吐出將手弄舌是也刺少商出血內服疏風甘桔湯生甘草桔梗歸尾花粉山梔甘葛玄參荊芥川芎連翹人參枳殼茯苓陳皮防風黃連七嗆食喉風心經熱毒咽燥無痰氣喘如心肺間刺痛者當歸連翹散加大黃利之如久變飛絲勞傷命當歸連翹散當歸連翹生甘草桔梗生地前胡枳殼黃芩玄參生白芍生山梔花粉燈草水煎服八纏舌喉風下頦俱腫口噤舌卷腫大上有青筋如蚓生黃刺白苔如咬牙刺少商九走馬喉風厚味風熱搖頭咬牙舌黑蒂疔赤破俱死或左右臉紫腫或牙關紫腫或舌卷針少許兼刺舌下三穴舌不卷不針十頂舌喉風喉腮下腫舌卷硬頂上顎遲即死刺少商針玉液金津十一落架風落下下頦日久難治服補中益氣湯灸頰車七壯十二連珠喉風舌下生珠初見一二少頃蔓生三五七九舌脹痰生先探痰十三松子喉風色如豬肝腫起形如松子滿喉皆赤氣逆關閉不食刺腫處吹藥宜去痰服藥宜三黃石膏竹葉加荊防十四骨槽風耳下牙關緊痛略有小核寒熱如瘧大人由於七情小兒本於稟賦十五腳跟喉風七情鬱結先從腳跟發起至於喉間或一年半年一發一日行一穴七日行七穴行至喉間發泡如魚泡狀荊防敗毒散主之泡水腥穢者死十六懸蜞風一名懸蜞蟲毒因上焦蘊熱風痰而起上顎腫垂形如蛙腹或似雞蛋喉閉痰滿以刀刺去紫血內服三黃涼膈散十七陰毒喉風少陰證脈微細沉自汗咽疼下利一名腎傷寒切不可用寒藥宜半夏桂枝湯苦酒湯之類臟寒咽痛者用蜜附子十八撮口喉風唇收如袋口不能飲有痰壅塞經年一發馬齒莧煎洗唇玄明醋探去痰針少商見血此證胃有痰火十九喉痹腫痛而黃其血黑形如臂其腫若坎面赤目上視先探痰腫不消用刀去血二十陰毒喉痹感冬月陰濕火邪而起喉間腫如紫李微見黑色惡寒身熱瞤動振惕腰疼足冷其血黑腫硬喉干不治二十一酒毒喉痹心脾之火形如卵鮮紅光亮壅塞喉間寒熱頭痛項強腫刺血內服黏子解毒湯加葛根二十二卒然閉塞氣不通而死名曰喉閉三稜針刺手腕中紫筋上或少商穴出血二十三風熱喉痹腫而紅紫形若拳目上視壯熱惡寒如音不高宜潤肺藥若外腫敷金箍散川大黃穿心者更佳用紙浸濕重包爐火煨廁中浸一宿取出洗淨曬乾研末聽用一兩五倍子醋炒黑三錢白芷五錢露蜂房蜜炙三錢芙蓉葉曬乾二兩羌活五錢共研細末瓷瓶裝每用蜜水調敷腫處周圍中留一孔出毒氣岩按外證紅腫亦能治二十四雙乳蛾在蒂疔兩旁似乳頭吞吐不利二十五單乳蛾或左或右手足厭冷頭目昏沉如厥短氣欲絕吳茱萸末米醋調敷湧泉穴二十六氣癰喉閉痰塞喉間寒熱分上中下三關在下關難治二十七死乳蛾雙單緊靠蒂疔不甚痛飲食有礙勞則痛日久塞咽漸漸氣悶喪命於蛾上亂劃七八刀令血出吹藥逐日如是患平乃止服三黃三陳忌煎炒雞魚牛羊犬肉生冷發物二十八乳蛾核兩邊如乳頭天陰勞力氣惱則頸外如繩釦緊飲食不下呼吸不利年深成嫩骨用刀割去吹藥二十九喉癬滿喉白色時醫每誤認白喉分爛喉風癬弱證喉癬二證虛實不同三十飛瘍因怒或中穢毒喉間忽然腫脹立刻轉大喪命吹藥去痰內服黏子解毒湯加紅花丹皮勿動刀針三十一風熱喉丹鮮紅久而赤紫吹藥服藥均重去痰可用刀刮針刺見血去熱毒三十二喉疔與單蛾相似蛾圓大疔長小紅易紫難黑不治三十三開花疔形若開花根下割去吹藥三黃涼膈煎服紅易紫難黑不治病原鼻滴汗於豆腐內食自死禽獸肉水缸內有米粒生毛此三因皆致喉中生開花疔之原三十四喉癰厚味積熱胃火上衝生蒂疔旁腫痛如蛾蛾圓而小癰塌而長耳根腮下俱腫痛牙疼去血吹藥服三黃三十五雙單喉瘤是肺熱生喉旁如圓眼血絲相裹不犯不痛須日夜安息以藥攻之不可用刀點麝二連一冰四日頻吹三十六喉癤生雄尾中初如梅核在喉膈間吐咽不下至三日漸上喉間刀刺後吹冰硼病由七情服四七氣湯三十七氣單鬱結靠舌根橫起紅紫色筋先用大針蘸桐油燒紅向舌橫筋上針七處次將三小針扎品字樣每大針孔上各針二次連大針共四十九針如舌根腫要灸外邊喉下橫三穴口內出煙為止如不出煙七壯止內服三黃涼膈及二陳三十八喉單滿喉微腫而紅針首尾出血服三黃涼膈三十九回食單一名甸氣一名梅核氣氣鬱熱痰而生喉兩邊兩硬條色紅為甸氣小舌下如豆大為梅核氣若疔下無核定在前舌根下或左右中有青筋系在顎或紫點如小豆或在舌根上青白色如蜆肉似桃膠兩旁紅筋垂下者皆是久則前心後背疼噯氣喉中若蟲行梗噎氣阻犯之即痛刀去血吹藥逐日如是喉外灸一穴至五穴口中出煙為度不出煙者灸至九壯四十氣子喉喉間如珠赤或紫白犯之即痛受氣必發日久則嗌氣挑破珠出血再吹藥四十一七星瘡是脾熱上顎屬脾生泡似粟如珠或黃或白口中腥臭手足怕冷身惡寒以布浸苦茶拭淨瘡上再吹藥戒酒色四十二喉球外感六氣內傷七情喉內生肉球如圓眼大根如線五寸余長相連肺上吐球出方可飲食手輕扯痛徹心內服益氣疏風湯升麻葛根防風紫蘇桔梗前胡白芍白蒺藜生地當歸川芎生甘草黃芩麥冬連翹青皮水煎服再用麝香二錢研分二次水調服或服麝香散三次根化而愈四十三喉疳風熱毒滿喉臭爛老年患者難治四十四口瘡積熱滿口生瘡黃白四十五走馬牙疳陽明濕毒牙齦黑爛脫落臭穢頃刻沿開穿腮破唇走入喉中者不治四十六珍珠毒胎熱舌上如珠先赤紫後白黃疼痛挑出血苦茶拭淨吹藥內服三黃涼膈散四十七懸癰生上顎形如紫李垂下抵舌口不能言舌不能伸頭不能低鼻出紅涕刺破癰頭出血鹽湯漱淨血吹藥內服荊防敗毒散四十八懸疔火熱蒂疔忽然紫腫下垂或偏或下吞吐不利不可刀刺宜吹藥或用烏龍尾加鹽炒箸頭點上枕頭仰臥一時四十九痰泡痰飲乘火凝注舌下結成泡腫綿軟不硬有妨言語作痛刀刺流出黃痰共黃渣捺淨吹冰硼散服二陳湯加芩連薄五十重舌下生小舌久則大舌捲起疼痛飲食不下頦下腫硬刺金玉二穴及小舌腫處出血五十一蓮花鈿舌舌下腫痛生五峰三峰者輕七峰者重宜針兩邊峰上用刀刮破出血吹藥中峰勿針五十二木舌硬如穿山甲見人舌做一拳憎寒壯熱語言蹇澀服黃連瀉心湯刀點出血刺金津玉液五十三螓舌因酒毒勞心鬱氣舌有四眼眼中流血者全證也或二三眼生舌中或生兩旁生七八眼者難治年老者不治若有黑心者大者用藥爛去小者用刀針挑去先用藥水洗淨然後吹藥內服三黃涼膈散舌不柔軟瘡不合口者皆死五十四脬舌痰火犯心經舌忽脹滿軟如豬尿脬不痛流涎妨言語看舌下如有青瘡如蟹眼須挑破出痰若雞蛋清用溫湯漱淨再吹冰硼玄明粉內服二陳五十五重顎舌上生瘡如楊梅作事心煩服甘桔湯黃連解毒湯有痰結成硬核者吹冰硼散內服加味二陳湯五十六雀舌心膈蘊熱生於舌畔割去吹生肌散內服三黃涼膈散五十七咂舌癰牙齦盡處兩邊生癰口臭吐涎舌尖短大未破者針去血吹藥已成內托五十八捲舌癰屬心經風熱生舌下或左或右或中狀如圓眼或似棗核腫痛害言語舌卷紫硬刀點去血吹藥內服黃連瀉心湯五十九死舌癰熱毒舌如白苔死色如木舌但木舌小硬此腫而白刀刮去白皮追風散加冰麝青皮乾薑末滿口擦之腫甚刺金玉出血如五七日有膿上下針出膿方愈如放膿見黑血刺治不轉色者死六十血衄舌上如針孔流血不止屬心火六十一舌上龜紋由思慮煩甚少睡所致舌痛若無皮淡白斑細點甚者陷路龜紋脈虛不渴四物湯加知柏丹皮肉桂舌硬柏一兩青黛三錢桂一錢冰二分吹六十二牙癰脾胃火大發於牙齦生毒如豆大或如指大紫腫硬痛頭項強痛惡寒發熱將針柄捺患處軟者是頭下刀出膿血吹藥六十三牙疔食毒穢物毒犯陽明生牙縫中牙齦上高腫突起大痛連腮破則流血去血後吹藥服三黃涼膈或千金內托酌用六十四牙宣牙縫出血不止上脾下胃吐血痰至升斗者難救六十五兜腮癰屬風熱溫毒生腮下兩邊或一邊如口內腫下刀去血日久去膿初起時頭痛寒熱服荊防敗毒散六十六面腮腫黑證面黑向下腫兩邊腮腫喉中氣閉用滾過熱水一盆洗手足見喉中出氣針少商穴有血可治吹追風散於頰內並牙盡處六十七出汗生癰同治六十八傷寒八九日後喉中腫閉熱入心脾六十九陰瘡生咽旁左右風濕鬱結而成煎炒炙煿所致用滾過熱水不時洗手足內服二陳七十喉腫脾經大毒因酒後行房酒氣不流聚結喉根不速治毒閉即死先去痰涎吹藥七十一鎖喉癰心與小腸之火發於聽會之端注於懸膺之側初如癧不能飲食閉塞難通紅腫發熱漸次潰膿軟而脹痛者針之初起外用蜒蚰麝冰杵敷內服當歸連翹散內閉牛黃清心丸日久千金內托散七十二蛤蟆瘟是傳染毒兩目鼻面腫乃陽明頭角兩耳腫屬少陽凡針家須知舌下三筋傷之出血不止除三筋外見有腫紫處亦宜針出血豈專執金津玉液二穴哉按咽喉七十二種有焦氏本吳氏本張氏本證治各家不同此與焦氏本大同小異閱者須在異處著脈尚有鐵崖道人咽喉七十二種口齒七十二種容俟續梓
